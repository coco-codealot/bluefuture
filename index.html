<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>login to the blue future</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @keyframes blink {
    50% { opacity: 0; }
  }
  .cursor {
    animation: blink 1s infinite;
  }
</style>
</head>

<body onload="setInterval(step,100)" class="m-0 p-5 bg-[#eaf4ff] text-[#0a1f3b] font-mono">

<div id="start" class="fixed inset-0 z-[999] flex items-center justify-center bg-[#eaf4ff] text-lg cursor-pointer px-4 text-center">
  click to initialize
</div>

<div id="boot" class="whitespace-pre-line leading-relaxed"></div>
<div class="cursor inline-block w-[10px] bg-[#0a1f3b]">&nbsp;</div>

<div id="inputBox" class="hidden mt-2">
  <input id="userInput" placeholder="who are you..."
    class="bg-transparent border border-[#5da9ff] text-[#0a1f3b] font-mono p-1 outline-none w-full max-w-[250px]" />
</div>

<div id="enter" class="hidden mt-5">
  <p><a href="about.html" class="text-[#5da9ff] no-underline hover:[text-shadow:0_0_5px_#5da9ff]">ENTER THE BLUE FUTURE</a></p>
</div>

<audio
  id="myAudio"
  src="https://file.garden/aeJQnJpyajBfOnje/freesound_community-computer-hum-78343.mp3"
  autoplay
  loop>
</audio>

<audio id="typeSound" src="https://files.catbox.moe/7o6n2v.mp3" preload="auto"></audio>

<script>
let message = "i am a robot but are you truly human";
function step() {
  message = message.substr(1) + message.substr(0, 1);
  document.title = message.substr(0, 15);
}

const lines = [
  "initializing network...",
  "connecting to the internet...",
  "accessing memory...",
  "who are you...",
  "__INPUT__",
  "",
  "welcome to the blue future",
  ""
];

let lineIndex = 0;
let charIndex = 0;

const boot = document.getElementById("boot");
const sound = document.getElementById("typeSound");
const inputBox = document.getElementById("inputBox");
const input = document.getElementById("userInput");

function typeEffect() {
  if (lineIndex < lines.length) {

    if (lines[lineIndex] === "__INPUT__") {
      inputBox.classList.remove("hidden");
      input.focus();
      return;
    }

    if (charIndex < lines[lineIndex].length) {
      boot.innerHTML += lines[lineIndex].charAt(charIndex);
      charIndex++;

      sound.currentTime = 0;
      sound.play();

      setTimeout(typeEffect, 40);

    } else {
      boot.innerHTML += "\n";
      lineIndex++;
      charIndex = 0;
      setTimeout(typeEffect, 300);
    }

  } else {
    document.querySelector(".cursor").classList.add("hidden");
    document.getElementById("enter").classList.remove("hidden");
  }
}

input.addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    const value = input.value.trim() || "unknown entity";

    inputBox.classList.add("hidden");
    boot.innerHTML += "> " + value + "\n";

    setTimeout(() => {
      boot.innerHTML += "[system response]\n";
      boot.innerHTML += "hello, " + value + "\n\n";

      lineIndex++;
      charIndex = 0;

      setTimeout(typeEffect, 500);
    }, 300);
  }
});

document.getElementById("start").onclick = () => {
  document.getElementById("start").classList.add("hidden");
  typeEffect();
};
</script>

</body>
</html>
