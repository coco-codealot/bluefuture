<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>login to the blue future</title>
<style>
body {
  background: #eaf4ff;
  color: #0a1f3b;
  font-family: "MS PGothic", monospace;
  margin: 0;
  padding: 20px;
}

#boot {
  white-space: pre-line;
  line-height: 1.6;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #0a1f3b;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

#inputBox {
  display: none;
  margin-top: 10px;
}

#userInput {
  background: transparent;
  border: 1px solid #5da9ff;
  color: #0a1f3b;
  font-family: monospace;
  padding: 5px;
  outline: none;
  width: 250px;
}

#enter {
  display: none;
  margin-top: 20px;
}

a {
  color: #5da9ff;
  text-decoration: none;
}

a:hover {
  text-shadow: 0 0 5px #5da9ff;
}

#start {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #eaf4ff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  z-index: 999;
}
</style>
</head>

<body onload="setInterval(step,100)">

<div id="start">click to initialize</div>

<div id="boot"></div>
<div class="cursor"></div>

<div id="inputBox">
  <input id="userInput" placeholder="who are you..." />
</div>

<div id="enter">
  <p><a href="about.html">ENTER THE BLUE FUTURE</a></p>
</div>

<audio
  id="myAudio"
  src="https://file.garden/aeJQnJpyajBfOnje/freesound_community-computer-hum-78343.mp3"
  autoplay
  loop>
</audio>

<audio id="typeSound" src="https://files.catbox.moe/7o6n2v.mp3" preload="auto"></audio>

<script>
let message = "i am a robot but are you truly human";
function step() {
  message = message.substr(1) + message.substr(0, 1);
  document.title = message.substr(0, 15);
}

const lines = [
  "initializing network...",
  "connecting to the internet...",
  "accessing memory...",
  "who are you...",
  "__INPUT__",
  "",
  "welcome to the blue future",
  ""
];

let lineIndex = 0;
let charIndex = 0;

const boot = document.getElementById("boot");
const sound = document.getElementById("typeSound");
const inputBox = document.getElementById("inputBox");
const input = document.getElementById("userInput");

function typeEffect() {
  if (lineIndex < lines.length) {

    if (lines[lineIndex] === "__INPUT__") {
      inputBox.style.display = "block";
      input.focus();
      return;
    }

    if (charIndex < lines[lineIndex].length) {
      boot.innerHTML += lines[lineIndex].charAt(charIndex);
      charIndex++;

      sound.currentTime = 0;
      sound.play();

      setTimeout(typeEffect, 40);

    } else {
      boot.innerHTML += "\n";
      lineIndex++;
      charIndex = 0;
      setTimeout(typeEffect, 300);
    }

  } else {
    document.querySelector(".cursor").style.display = "none";
    document.getElementById("enter").style.display = "block";
  }
}

input.addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    const value = input.value.trim() || "unknown entity";

    inputBox.style.display = "none";
    boot.innerHTML += "> " + value + "\n";

    setTimeout(() => {
      boot.innerHTML += "[system response]\n";
      boot.innerHTML += "hello, " + value + "\n\n";

      lineIndex++;
      charIndex = 0;

      setTimeout(typeEffect, 500);
    }, 300);
  }
});

document.getElementById("start").onclick = () => {
  document.getElementById("start").style.display = "none";
  typeEffect();
};
</script>

</body>
</html>
